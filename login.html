<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextileMS Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3a5f, #4b79a1);
        }

        .container {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .2);
        }

        h1 {
            text-align: center;
            color: #1e3a5f;
        }

        p {
            text-align: center;
            margin-bottom: 20px;
            color: gray;
        }

        .role-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-box input {
            display: none;
        }

        .role-box label {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #eee;
            border-radius: 8px;
            cursor: pointer;
        }

        .role-box input:checked+label {
            background: #1e3a5f;
            color: white;
        }

        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #1e3a5f;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #294b74;
        }

        #error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🧵 TextileMS</h1>
        <p>Order & Shipment Management System</p>

        <form onsubmit="login(event)">

            <div class="role-box">

                <input type="radio" id="admin" name="role" value="admin" checked>
                <label for="admin">👨‍💼 Admin</label>

                <input type="radio" id="user" name="role" value="user">
                <label for="user">👨‍🏭 User</label>

            </div>

            <input type="text" id="username" placeholder="Username" required>

            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">Login</button>

            <div id="error"></div>

        </form>

    </div>

    <script>

        function login(event) {

            event.preventDefault();

            let role =
                document.querySelector('input[name="role"]:checked').value;

            let username =
                document.getElementById("username").value;

            let password =
                document.getElementById("password").value;

            // Admin Login
            if (
                role === "admin" &&
                username === "admin" &&
                password === "admin123"
            ) {
                alert("Admin Login Successful");
                window.location.href = "admin_dashboard.html";
            }

            // User Login
            else if (
                role === "user" &&
                username === "user" &&
                password === "user123"
            ) {
                alert("User Login Successful");
                window.location.href = "user_dashboard.html";
            }

            else {
                document.getElementById("error").innerHTML =
                    "❌ Invalid Username, Password or Role";
            }

        }

    </script>

</body>

</html>
